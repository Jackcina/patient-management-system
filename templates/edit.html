<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h2>Edit Patient</h2>

<form method="POST" autocomplete="off">
    <label>Date of Joining</label><br>
    <input type="date" name="doj" value="{{patient[1]}}"required><br><br>

    <label>Patient Name</label><br>
    <input type="text" name="patient_name" value="{{ patient[2] }}" required><br><br>
    
     <label>Phone Number</label><br>
    <input type="text" name="phone_no" value="{{patient[3]}}" required><br><br>

    <label>Date of Birth</label><br>
    <input type="date" name="dob" value="{{patient[4]}}" required><br><br>

    <label>Age</label><br>
    <input type="number" name="age" value="{{ patient[5] }}" required><br><br>

    <label>Sex</label><br>

    <input type="radio" name="sex" value="Male" {% if patient[6]=='Male' %}checked{% endif %}> Male
    <input type="radio" name="sex" value="Female" {% if patient[6]=='Female' %}checked{% endif %}> Female

    <br><br>

    <label>Duration</label><br>
    <input type="text" name="duration" value="{{ patient[7] }}"required><br><br>

    <label>Disease</label><br>
    <input type="text" name="disease" value="{{ patient[8] }}"required><br><br>

    <label>Before</label><br>
    <input type="text" name="before_value" value="{{ patient[9] }}" required><br><br>

    <label>After</label><br>
    <input type="text" name="after_value" value="{{ patient[10] }}" required><br><br>
    
    <label>Notes</label><br>
    <textarea name="notes">{{ patient[11]}}</textarea><br><br>

    <button type="submit">Update Patient</button>

</form>

<br>
<a href="/">⬅ Back to Home</a>

</div>

</body>
</html>
